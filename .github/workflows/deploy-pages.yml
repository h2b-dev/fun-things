name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'tiny_dungeon_web/**'
      - 'tiny_td_web/**'
      - 'tiny_puzzle_web/**'
      - 'tiny_breakout_web/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build site
        run: |
          mkdir -p _site
          cp -r tiny_dungeon_web/* _site/
          mkdir -p _site/tiny-td
          cp -r tiny_td_web/* _site/tiny-td/
          mkdir -p _site/tiny-puzzle
          cp -r tiny_puzzle_web/* _site/tiny-puzzle/
          mkdir -p _site/tiny-breakout
          cp -r tiny_breakout_web/* _site/tiny-breakout/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
